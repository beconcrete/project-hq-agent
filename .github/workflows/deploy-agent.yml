name: Deploy Agent Function App

on:
  push:
    branches:
      - main
    paths:
      - "agents/contract-orchestrator-agent/**"
      - "shared/**"
      - ".github/workflows/deploy-agent.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    name: Build and Deploy

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Publish
        run: dotnet publish agents/contract-orchestrator-agent/ContractOrchestratorAgent.csproj --configuration Release --output agents/publish

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to Azure Function App
        uses: azure/webapps-deploy@v3
        with:
          app-name: hq-agent-function-app
          package: agents/publish
