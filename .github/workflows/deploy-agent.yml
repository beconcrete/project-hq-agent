name: Deploy Contract Orchestrator Agent

on:
  push:
    branches:
      - main
    paths:
      - "agents/contract-orchestrator-agent/**"
      - "shared/**"
      - ".github/workflows/deploy-agent.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    name: Build and Deploy

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Publish
        run: dotnet publish agents/contract-orchestrator-agent/ContractOrchestratorAgent.csproj --configuration Release --output agents/publish

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Provision Function App if not exists
        run: |
          existing=$(az functionapp show \
            --name hq-agent-orchestrator-app \
            --resource-group hq-agent-resource-group \
            --query name -o tsv 2>/dev/null || echo "")

          if [ -z "$existing" ]; then
            echo "Creating hq-agent-orchestrator-app..."
            az functionapp create \
              --name hq-agent-orchestrator-app \
              --resource-group hq-agent-resource-group \
              --storage-account hqagentstorage \
              --consumption-plan-location northeurope \
              --runtime dotnet-isolated \
              --runtime-version 8 \
              --functions-version 4 \
              --os-type Linux \
              --output none
          else
            echo "hq-agent-orchestrator-app already exists, skipping create."
          fi

      - name: Deploy to Azure Function App
        uses: azure/webapps-deploy@v3
        with:
          app-name: hq-agent-orchestrator-app
          package: agents/publish
