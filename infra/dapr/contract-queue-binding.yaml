apiVersion: dapr.io/v1alpha1
kind: Component
metadata:
  name: contract-processing-queue
spec:
  # Dapr polls the Azure Storage Queue and POSTs each message to
  # POST /contract-processing-queue on the app (port 8080).
  # Connection string is injected at container startup by entrypoint.sh.
  type: bindings.azure.storagequeues
  version: v1
  metadata:
    - name: storageAccount
      value: hqagentstorage
    - name: queue
      value: contract-processing
    - name: storageConnectionString
      value: "PLACEHOLDER_REPLACED_AT_RUNTIME"
